<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xem Video Tự Động</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: Arial, sans-serif;
    }

    /* Khung chứa 1 ảnh lấp đầy toàn bộ màn hình */
    .image-container {
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Giúp ảnh phủ kín màn hình mà không bị co giãn méo */
      display: block;
    }

    /* Màn hình phát Video tràn toàn màn hình */
    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 70vw;
      height: 70vh;
      background-color: #000;
      display: none; /* Mặc định ẩn */
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    /* Video lấp đầy toàn màn hình */
    .video-overlay video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Lấp đầy toàn màn hình */
    }

    /* Nút quay lại/đóng video */
    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background-color: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: 1px solid #fff;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      z-index: 1001;
    }

    .close-btn:hover {
      background-color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

  <!-- Khung ảnh hiển thị ban đầu -->
  <div class="image-container" onclick="playVideo()">
    <!-- Thay 'hinhanh.jpg' bằng tên file ảnh trên máy bạn -->
    <img src="anh.jpg" alt="Bấm vào đây để xem video">
  </div>

  <!-- Khung phát video full màn hình -->
  <div class="video-overlay" id="videoOverlay">
    <button class="close-btn" onclick="closeVideo()">✕ Quay lại</button>
    <!-- Thay 'video.mp4' bằng tên file video trên máy bạn -->
    <video id="mainVideo" src="video.mp4" controls></video>
  </div>

  <script>
    const videoOverlay = document.getElementById('videoOverlay');
    const mainVideo = document.getElementById('mainVideo');

    function playVideo() {
      // Bật âm thanh (muted = false)
      mainVideo.muted = false;

      // Hiển thị khung video
      videoOverlay.style.display = 'flex';

      // Phát video ngay lập tức
      mainVideo.play().catch(function(error) {
        console.log("Lỗi tự động phát: ", error);
      });
    }

    function closeVideo() {
      // Dừng video và ẩn màn hình video
      mainVideo.pause();
      mainVideo.currentTime = 0;
      videoOverlay.style.display = 'none';
    }
  </script>
</body>
</html>
